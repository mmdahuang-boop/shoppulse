function fmt(n) { if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; if (n == null) return '--'; return n.toLocaleString(); }

const CAT_COLORS = {
  Beauty: '#ff6b9d', Furniture: '#e17055', Kitchenware: '#fdcb6e', Appliances: '#74b9ff',
  Stationery: '#a29bfe', Office: '#636e72', Bags: '#fd79a8', Toys: '#f0932b',
  Clothing: '#6c5ce7', Footwear: '#00b894', Electronics: '#0984e3', Home: '#00cec9',
  Food: '#e84393', Other: '#666'
};

function renderStats() {
  const cats = DATA.categories;
  let totalProducts = 0;
  Object.values(cats).forEach(c => totalProducts += c.count);

  let html = `
    <div class="stat-card">
      <div class="value" style="color:#00f2ea">${totalProducts}</div>
      <div class="label">Trending Products</div>
    </div>
    <div class="stat-card">
      <div class="value" style="color:#ff0050">${fmt(DATA.total_engagement)}</div>
      <div class="label">Total Likes</div>
    </div>
    <div class="stat-card">
      <div class="value" style="color:#f9ca24">${Object.keys(cats).length}</div>
      <div class="label">Categories</div>
    </div>`;

  // Top 5 categories by count
  const sorted = Object.entries(cats).sort((a,b) => b[1].count - a[1].count);
  sorted.slice(0, 5).forEach(([key, val]) => {
    html += `
    <div class="stat-card">
      <div class="value" style="color:${CAT_COLORS[key]||'#888'}">${val.count}</div>
      <div class="label">${val.emoji} ${val.display_name}</div>
    </div>`;
  });

  document.getElementById('stats').innerHTML = html;
  document.getElementById('updateTime').textContent = DATA.generated_at;
}

function renderFilters() {
  const cats = DATA.categories;
  let html = '<button class="filter-btn active" onclick="filter(\'all\')">All Categories</button>';
  Object.entries(cats).forEach(([key, val]) => {
    html += `<button class="filter-btn" onclick="filter('${key}')">${val.emoji} ${val.display_name} (${val.count})</button>`;
  });
  document.getElementById('filters').innerHTML = html;
}

            <span>💬 <span class="val">${fmt(eng.comments)}</span></span>
          </div>
          ${creator.name ? `
          <div class="creator-row">
            <div class="creator-avatar">${creator.name[0]}</div>
            <div>
              <span class="creator-name">@${creator.name}</span>
              <span class="creator-stats">· ${f} followers · ~$${fmt(creator.est_gmv)} GMV</span>
            </div>
          </div>` : ''}
          <div style="font-size:10px;color:#555;margin-top:4px;">🏪 ${p.shop} · 🏷️ ${eng.keyword||''}</div>
        </div>
      </div>`;
    });

    html += '</div></div>';
  });

  document.getElementById('products').innerHTML = html || '<div style="text-align:center;padding:60px;color:#666;">No data for this category</div>';
}

function filter(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderProducts(cat);
}

renderStats();
renderFilters();
renderProducts('all');
</script>
</body>
</html>
