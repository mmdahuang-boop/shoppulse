function renderStats() {
  const products = DATA.products;
  const liveProducts = products.filter(p => p.source === 'douyin_video_search');
  const mockProducts = products.filter(p => p.source === 'mock');
  const categories = {};
  products.forEach(p => { categories[p.category] = (categories[p.category]||0) + 1; });

  const totalEngagement = liveProducts.reduce((sum, p) => sum + (p.engagement?.digg||0), 0);

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="value" style="color:#00f2ea">${liveProducts.length}</div>

function formatNum(n) { if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return n.toString(); }

function renderProducts(filterCat) {
  const products = filterCat === 'all' ? DATA.products : DATA.products.filter(p => p.category === filterCat);
  if (products.length === 0) {
    document.getElementById('products').innerHTML = '<div class="empty">该品类暂无数据</div>';
    return;
  }

      <div class="card-body">

          `}
        </div>
        ${isLive ? `<div class="metric" style="font-size:12px;color:#888;">💰 参考价: <strong style="color:#e0e0e0;">$${p.price?.toFixed(2)}</strong> · 预估销量: <strong style="color:#e0e0e0;">${formatNum(p.sales)}</strong></div>` : ''}
        ${creator.name ? `
        <div class="creator-row">
          <div class="creator-avatar">${creator.name[0]}</div>
          <div class="creator-info">
            <div class="c-name">@${creator.name}</div>
            <div class="c-stats">粉${followerStr} · 预估GMV $${formatNum(creator.est_gmv||0)}</div>
          </div>
        </div>` : ''}
      </div>
      <div class="card-footer">
        <span>🏪 ${p.shop||'--'}</span>
        <span>📸 ${p.snapshot_count} 条快照</span>
      </div>
    </div>`;
  }).join('');
}

function filter(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderProducts(cat);
}

renderStats();
renderProducts('all');
</script>
</body>
</html>
